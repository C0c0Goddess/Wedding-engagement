<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loyalty Ova Love Wedding Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app" class="hidden">
        <section class="tablet">
            <aside class="sidebar">
                <h1>LOL</h1>
                <p>Wedding Planner</p>
                <button>Dashboard</button>
                <button>Rings</button>
                <button>Venues</button>
                <button>Guests</button>
                <button>License</button>
                <button>Name Change</button>
                <button>Contracts</button>
            </aside>

            <section class="content">
                <header>
                    <h2>Luxury Wedding Dashboard</h2>
                    <button onclick="closeUI()">Close</button>
                </header>

                <div class="cards">
                    <div class="card">
                        <h3>Diamond Rings</h3>
                        <p>Gold, silver, rose gold, and wedding bands.</p>
                    </div>

                    <div class="card">
                        <h3>Proposal System</h3>
                        <p>Use /propose [id] near the person.</p>
                    </div>

                    <div class="card">
                        <h3>Married Name Tags</h3>
                        <p>Displays Mr. or Mrs. Lastname above married players.</p>
                    </div>
                </div>
            </section>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
